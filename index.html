<title>বাস্তু বিশ্লেষক Pro</title>
<style>
:root{--g:#C9A84C;--dk:#0C0800;--cd:#17100A;--b:#C9A84C28;--tx:#f5e6c8;--sb:#a07050;--re:#e74c3c;--gr:#27ae60;--wn:#e67e22;--st:env(safe-area-inset-top,0px);--sb2:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--dk);font-family:'Noto Serif Bengali','Noto Serif Devanagari','Libre Baskerville',Georgia,serif;color:var(--tx);display:flex;flex-direction:column}
#hdr{background:linear-gradient(180deg,#3d1800,#150800);padding:calc(var(--st) + 10px) 14px 10px;border-bottom:2px solid var(--g);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.hl{display:flex;align-items:center;gap:10px}
.ho{font-size:26px}
.ht{font-size:16px;font-weight:bold;color:var(--g)}
.hs{font-size:9px;color:#c4a882;font-style:italic}
.ls{background:#2d1000;color:var(--g);border:1px solid var(--g);border-radius:7px;padding:5px 8px;font-family:inherit;font-size:11px;cursor:pointer}
#tabs{display:flex;background:#0e0800;border-bottom:1px solid var(--b);flex-shrink:0;overflow-x:auto}
.tb{flex:1;min-width:55px;padding:10px 3px;background:transparent;color:var(--sb);border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:10px;font-family:inherit;white-space:nowrap;transition:all .25s}
.tb.act{background:linear-gradient(180deg,#3d1800,#150800);color:var(--g);border-bottom:3px solid var(--g);font-weight:bold}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--sb2) + 14px)}
.card{background:var(--cd);border:1px solid var(--b);border-radius:11px;padding:14px;margin-bottom:11px}
.sh{color:var(--g);font-size:13px;font-weight:bold;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.lbl{display:block;font-size:10px;color:var(--sb);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px}
.inp,.sl,.ta{width:100%;background:#0e0900;border:1px solid var(--b);border-radius:8px;padding:10px 12px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}
.ta{resize:vertical;min-height:68px}
.btn{width:100%;border:none;border-radius:9px;padding:14px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-p{background:linear-gradient(135deg,#7a3a0a,var(--g));color:#1a0800;box-shadow:0 4px 20px #C9A84C44}
.btn-p:disabled{background:var(--cd);border:1px solid var(--b);color:var(--sb);cursor:not-allowed;box-shadow:none}
.bdg{font-size:10px;padding:2px 8px;border-radius:8px;display:inline-block}
.bg{background:#0e2a0e;color:#90EE90}
.br{background:#2a0a0a;color:#FF6B6B}
.bw{background:#2a1a00;color:#FFD700}
.err{background:#2a0a0a;border:1px solid #FF6B6B33;border-radius:8px;padding:11px;color:#FF6B6B;font-size:12px;margin-bottom:11px}
/* Inner tabs */
.itabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.itb{padding:7px 11px;border-radius:18px;border:1px solid var(--b);background:transparent;color:var(--sb);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.itb.act{background:var(--g)22;color:var(--g);border-color:var(--g)55}
/* Book toggle */
.btog{width:38px;height:22px;border-radius:11px;border:none;cursor:pointer;flex-shrink:0;position:relative;transition:background .3s}
.bdot{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;transition:left .3s}
/* Grid */
.gwrap{overflow-x:auto;padding-bottom:4px}
.vgrid{display:inline-grid;gap:1px;background:var(--g)22;border:1px solid var(--g)33;border-radius:4px}
.gc{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:7px;cursor:pointer;border-radius:2px;background:#1a1000;color:var(--sb);text-align:center;line-height:1.2;transition:all .2s;overflow:hidden}
.gc.sel{background:var(--g)33;color:var(--g);font-weight:bold}
.gc.bra{background:#3d2500;color:var(--g)}
.gc:active{transform:scale(.9)}
/* Dosha cards */
.dc{border-radius:10px;padding:13px;margin-bottom:10px;border-left:4px solid}
.dcr{background:#1a0808;border-color:var(--re)}
.dcw{background:#1a1000;border-color:var(--wn)}
.dcg{background:#081408;border-color:var(--gr)}
.shbox{background:#1e1000;border-left:3px solid var(--g);border-radius:0 7px 7px 0;padding:11px;margin:9px 0}
.shs{font-size:12px;color:#e8c98a;font-style:italic;line-height:1.9;margin-bottom:4px}
.shm{font-size:11px;color:#c4a882;margin-bottom:5px}
.shsr{font-size:9px;color:var(--g);background:#2d1500;padding:2px 7px;border-radius:7px;display:inline-block}
.cbox{background:#1a0a20;border:1px solid #9B59B633;border-radius:7px;padding:9px;margin:7px 0;font-size:11px;color:#c4a0ff}
/* Share */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sbtn{padding:12px 6px;border:none;border-radius:9px;font-size:11px;font-weight:bold;cursor:pointer;font-family:inherit}
.sbtn:active{transform:scale(.97)}
/* Install */
.iban{background:linear-gradient(135deg,#1a3300,#0a1a00);border:1px solid #90EE9044;border-radius:10px;padding:11px 13px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.ibtn{background:#90EE90;color:#0a1a00;border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:bold;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
/* score ring */
.sr{display:inline-block;border-radius:50%;padding:3px}
.si{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:var(--g)}
</style>
</head>

// ── ANALYZE ──
async function doAn(){
  const tt=t();
  const ab=books.filter(b=>b.on);
  if(!ab.length){F._e=tt.nbW;R();return;}
  if(!F.cN||!F.mE){F._e=tt.fW;R();return;}
  F._e="";loading=true;report=null;R();
  try{
    const ln=lang==="as"?"Assamese (অসমীয়া)":lang==="hi"?"Hindi (हिंदी)":"English";
    const bp=ab.map((b,i)=>`Priority ${i+1}: "${b.name}"`).join("; ");
    const gi=Object.entries(mGrid).map(([k,v])=>`Cell ${k}=${v}`).join(", ")||"Not mapped";
    const sys=`You are a world-class Vastu Shastra expert. ONLY use knowledge from the provided PDF books. Never use external knowledge.
BOOK PRIORITY: ${bp}
CONFLICT RULE: When books disagree, the higher-priority book's view takes precedence. Always show conflicts with alternative views.
Generate a comprehensive analysis in ${ln}.
Return ONLY valid JSON (no markdown, no code fences):
{"clientName":"","address":"","date":"","mainEntrance":"","overallScore":0-100,"summary":"2-3 sentences","plotAnalysis":{"score":0-100,"observations":[],"doshas":[{"name":"","severity":"critical|moderate|minor","description":"","remedy":"","shloka":{"sanskrit":"exact quote from book","transliteration":"","meaning":"","source":"bookname, chapter/page"},"conflict":null}]},"buildingAnalysis":{"score":0-100,"observations":[],"doshas":[]},"mandalaAnalysis":{"score":0-100,"brahmasthanaStatus":"","gridObservations":[],"doshas":[]},"environmentAnalysis":{"score":0-100,"observations":[],"doshas":[]},"topRemedies":[],"booksUsed":[]}
For conflict field use: {"primaryBook":"","primaryView":"","alternativeBook":"","alternativeView":""} or null if no conflict.`;
    const uc=[
      ...ab.map(b=>({type:"document",source:{type:"base64",media_type:"application/pdf",data:b.b64},title:b.name})),
      {type:"text",text:`CLIENT: ${F.cN}\nADDRESS: ${F.ad||"N/A"}\nDATE: ${new Date().toLocaleDateString(lang==="as"?"as-IN":lang==="hi"?"hi-IN":"en-IN",{year:"numeric",month:"long",day:"numeric"})}\n\nPLOT:\n- Shape: ${F.pSh||"N/A"}\n- Slope: ${F.pSl||"N/A"}\n- Road: ${F.rD||"N/A"}\n- Water: ${F.wS||"N/A"}\n- Surroundings: ${F.sur||"N/A"}\n- Size: ${F.pSz||"N/A"}\n\nBUILDING:\n- Main Entrance: ${F.mE}\n- Kitchen: ${F.ki||"N/A"}\n- Bedroom: ${F.be||"N/A"}\n- Master Bed: ${F.mb||"N/A"}\n- Toilet: ${F.to||"N/A"}\n- Staircase: ${F.st||"N/A"}\n- Brahmasthan: ${F.br||"N/A"}\n- Puja: ${F.po||"N/A"}\n- Hall: ${F.ha||"N/A"}\n\nENVIRONMENT:\n- Temple: ${F.nT||"N/A"}\n- Water body: ${F.nW||"N/A"}\n- Cemetery: ${F.nC||"N/A"}\n- Hospital: ${F.nH||"N/A"}\n- Tree: ${F.tP||"N/A"} ${F.tD?"("+F.tD+")":""}\n- Additional: ${F.ai||"N/A"}\n\nMANDALA GRID (${mSize}×${mSize}): ${gi}\nBOOK PRIORITY: ${bp}`}
    ];
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:6000,system:sys,messages:[{role:"user",content:uc}]})});
    const data=await res.json();
    const txt=data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    report=JSON.parse(txt);
    loading=false;ST(3);
  }catch(e){F._e=t().eA;loading=false;R();}
}

  const all=[...(report.plotAnalysis?.doshas||[]).map(d=>({...d,sec:"Plot"})),...(report.buildingAnalysis?.doshas||[]).map(d=>({...d,sec:"Building"})),...(report.mandalaAnalysis?.doshas||[]).map(d=>({...d,sec:"Mandala"})),...(report.environmentAnalysis?.doshas||[]).map(d=>({...d,sec:"Environment"}))];
  const sv=s=>s==="critical"?tt.cr:s==="moderate"?tt.mo:tt.mi;
  const sc3=s=>s==="critical"?"#e74c3c":s==="moderate"?"#e67e22":"#27ae60";
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${tt.rTi} - ${report.clientName}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali&family=Noto+Serif+Devanagari&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

</head><body><div class="pg">
<div class="cv">
<span style="font-size:50px;display:block;margin-bottom:10px">🕉️</span>
<h1 style="font-size:28px;color:#C9A84C;letter-spacing:2px;margin-bottom:5px">${tt.rTi}</h1>
<div style="font-size:11px;color:#c4a882;font-style:italic;margin-bottom:36px">${tt.s}</div>
<div style="display:inline-block;background:conic-gradient(#C9A84C ${report.overallScore*3.6}deg,#2a1500 0);border-radius:50%;padding:3px;margin-bottom:7px">
<div style="width:76px;height:76px;background:#150800;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#C9A84C">${report.overallScore}</div></div>
<div style="font-size:11px;color:#a08050;margin-bottom:28px">${tt.oS}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:13px;text-align:left;border-top:1px solid #C9A84C44;padding-top:22px">
<div><div style="font-size:9px;color:#806030;text-transform:uppercase;letter-spacing:1px">${tt.cL}</div><div style="font-size:13px;color:#f5e6c8;margin-top:2px">${report.clientName}</div></div>
<div><div style="font-size:9px;color:#806030;text-transform:uppercase;letter-spacing:1px">${tt.dL}</div><div style="font-size:13px;color:#f5e6c8;margin-top:2px">${report.date}</div></div>
<div><div style="font-size:9px;color:#806030;text-transform:uppercase;letter-spacing:1px">${tt.aL}</div><div style="font-size:13px;color:#f5e6c8;margin-top:2px">${report.address||"—"}</div></div>
<div><div style="font-size:9px;color:#806030;text-transform:uppercase;letter-spacing:1px">${tt.fL}</div><div style="font-size:13px;color:#f5e6c8;margin-top:2px">${report.mainEntrance}</div></div>
</div></div>
<div class="sc"><div class="sh2">📋 Summary</div><div style="font-size:13px;color:#2a1800;line-height:1.9">${report.summary}</div></div>
${[{ti:"📍 Plot Analysis",d:report.plotAnalysis},{ti:"🏠 Building Analysis",d:report.buildingAnalysis},{ti:"🔯 Mandala Analysis",d:report.mandalaAnalysis},{ti:"💧 Environment",d:report.environmentAnalysis}].filter(s=>s.d).map(s=>`<div class="sc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div class="sh2" style="margin:0">${s.ti}</div><div style="background:${sc(s.d.score||0)};color:#fff;padding:3px 11px;border-radius:11px;font-size:12px;font-weight:bold">${s.d.score}/100</div></div>${(s.d.observations||s.d.gridObservations||[]).map(o=>`<div style="font-size:13px;color:#2a1800;padding:5px 0;border-bottom:1px dashed #f0e6d0">• ${o}</div>`).join("")}${s.d.brahmasthanaStatus?`<div style="font-size:13px;color:#856000;margin-top:7px;font-weight:bold">🔯 Brahmasthan: ${s.d.brahmasthanaStatus}</div>`:""}</div>`).join("")}
<div class="sc"><div class="sh2">🚨 Detected Doshas (${all.length})</div>
${all.map(d=>`<div class="dc2" style="background:${d.severity==="critical"?"#fff0f0":d.severity==="moderate"?"#fffbf0":"#f0fff4"};border-color:${sc3(d.severity)}">
<div style="display:flex;justify-content:space-between;margin-bottom:5px"><div><strong style="font-size:14px">${d.name}</strong><div style="font-size:10px;color:#6b4a20">${d.sec}</div></div><span style="background:${sc3(d.severity)};color:#fff;padding:2px 9px;border-radius:9px;font-size:11px">${sv(d.severity)}</span></div>

${d.shloka?.sanskrit?`<div class="slk"><div style="font-size:13px;color:#3a1800;font-style:italic;line-height:1.9;margin-bottom:4px">"${d.shloka.sanskrit}"</div>${d.shloka.transliteration?`<div style="font-size:11px;color:#806030;font-style:italic;margin-bottom:4px">${d.shloka.transliteration}</div>`:""}<div style="font-size:12px;color:#5a3010;margin-bottom:5px">📖 ${d.shloka.meaning}</div><span style="font-size:10px;color:#9b7040;background:#f5e0c0;padding:2px 7px;border-radius:7px">📚 ${d.shloka.source}</span></div>`:""}
<div style="font-size:11px;color:#806030;text-transform:uppercase;letter-spacing:.7px;margin:7px 0 4px">🔧 ${tt.re}</div>
<div style="font-size:13px;color:#2a1800;line-height:1.7">${d.remedy}</div>
${d.conflict?`<div class="co2"><strong>⚖️ ${tt.co}:</strong> ${d.conflict.primaryBook}: ${d.conflict.primaryView}<br><em>${tt.av} (${d.conflict.alternativeBook}): ${d.conflict.alternativeView}</em></div>`:""}
</div>`).join("")}</div>
<div class="tp"><div style="font-size:17px;font-weight:bold;color:#C9A84C;margin-bottom:16px">⭐ ${tt.tR}</div>
${(report.topRemedies||[]).map((r,i)=>`<div style="display:flex;gap:11px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,.15);font-size:13px"><div style="width:24px;height:24px;border-radius:50%;background:#C9A84C;color:#150800;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;flex-shrink:0">${i+1}</div><div>${r}</div></div>`).join("")}
</div>
<div style="padding:14px 48px;background:#f9f4ea;font-size:11px;color:#6b4a20"><strong>📚 ${tt.src}:</strong> ${(report.booksUsed||books.filter(b=>b.on).map(b=>b.name)).join(", ")}</div>
<div class="ft">🕉️ ${tt.n} • ${tt.s}</div>
</div></body></html>`;
}

function dDl(){const bl=new Blob([bHTML()],{type:"text/html;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download=`Vastu_${report.clientName.replace(/\s+/g,"_")}.html`;a.click();}
function dWa(){window.open(`https://wa.me/?text=${encodeURIComponent(t().n+" | "+report.clientName+" | "+t().oS+": "+report.overallScore+"/100")}`,"_blank");}
function dEm(){const s=encodeURIComponent(`${t().rTi} - ${report.clientName}`);const b=encodeURIComponent(`${t().cL}: ${report.clientName}\n${t().oS}: ${report.overallScore}/100\n\n${report.summary}`);window.open(`mailto:?subject=${s}&body=${b}`,"_blank");}
function dPr(){const w=window.open("","_blank");w.document.write(bHTML());w.document.close();setTimeout(()=>w.print(),800);}

function AE(){
  const bi=document.getElementById("bi");
  if(bi)bi.onchange=async e=>{
    for(const f of Array.from(e.target.files)){
      if(f.type!=="application/pdf")continue;
      const b64v=await b64(f);
      books.push({name:f.name,b64:b64v,sz:(f.size/1024).toFixed(0),on:true});
    }
    e.target.value="";R();
  };
}

RT();R();
