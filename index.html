<title>বাস্তু বিশ্লেষক</title>
<style>
:root {
  --gold: #C9A84C;
  --dark: #0C0800;
  --card: #17100A;
  --border: #C9A84C30;
  --text: #f5e6c8;
  --sub: #a07050;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--dark);
  font-family: 'Noto Serif Bengali','Noto Serif Devanagari','Libre Baskerville',Georgia,serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
}
/* Header */
.header {
  background: linear-gradient(180deg,#3d1800,#150800);
  padding: calc(var(--safe-top) + 12px) 16px 12px;
  border-bottom: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-om { font-size: 28px; }
.header-title { font-size: 17px; font-weight: bold; color: var(--gold); }
.header-sub { font-size: 10px; color: #c4a882; font-style: italic; }
.lang-select {
  background: #2d1000; color: var(--gold); border: 1px solid var(--gold);
  border-radius: 8px; padding: 6px 10px; font-family: inherit; font-size: 12px; cursor: pointer;
}
/* Tabs */
.tabs {
  display: flex; background: #0e0800;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab {
  flex: 1; padding: 12px 4px; background: transparent; color: var(--sub);
  border: none; border-bottom: 3px solid transparent;
  cursor: pointer; font-size: 11px; font-family: inherit;
  font-weight: normal; transition: all 0.25s;
}
.tab.active {
  background: linear-gradient(180deg,#3d1800,#150800);
  color: var(--gold); border-bottom: 3px solid var(--gold); font-weight: bold;
}
/* Scrollable content */
.content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--safe-bot) + 16px);
}
/* Cards & UI */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.upload-zone {
  background: var(--card); border: 2px dashed var(--gold);
  border-radius: 12px; padding: 28px 16px; text-align: center;
  cursor: pointer; margin-bottom: 16px; transition: all 0.2s;
}
.upload-zone:active { transform: scale(0.98); }
.upload-icon { font-size: 36px; margin-bottom: 8px; }
.upload-title { color: var(--gold); font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.upload-sub { color: var(--sub); font-size: 12px; }
.section-title { color: var(--gold); font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.book-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.book-info { display: flex; align-items: center; gap: 10px; }
.book-icon { font-size: 24px; }
.book-name { font-size: 13px; font-weight: bold; color: var(--text); }
.book-size { font-size: 11px; color: var(--sub); }
.del-btn {
  background: #2a0a0a; border: 1px solid #FF6B6B44; color: #FF6B6B;
  padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 11px; font-family: inherit;
}
.badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; }
.badge-green { background: #0e2a0e; color: #90EE90; }
.badge-warn { background: #2a1a00; color: #FFD700; }
.go-next {
  background: #0a2200; border: 1px solid #90EE9033; border-radius: 10px;
  padding: 14px; margin-top: 10px; font-size: 13px; color: #90EE90;
  text-align: center; cursor: pointer; width: 100%; font-family: inherit;
}
/* Form */
.form-label { display: block; font-size: 11px; color: var(--sub); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.8px; }
.form-input, .form-select, .form-textarea {
  width: 100%; background: #0e0900; border: 1px solid var(--border);
  border-radius: 8px; padding: 11px 14px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none; margin-bottom: 14px;
}
.form-select { appearance: none; -webkit-appearance: none; }
.form-textarea { resize: vertical; min-height: 80px; }
.analyze-btn {
  width: 100%; border: none; border-radius: 10px; padding: 16px;
  font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit;
  transition: all 0.3s;
}
.analyze-btn.ready {
  background: linear-gradient(135deg,#7a3a0a,#C9A84C);
  color: #1a0800; box-shadow: 0 4px 24px #C9A84C44;
}
.analyze-btn.loading {
  background: var(--card); border: 1px solid var(--border); color: var(--sub); cursor: not-allowed;
}
.error-box { background: #2a0a0a; border: 1px solid #FF6B6B33; border-radius: 8px; padding: 12px; color: #FF6B6B; font-size: 13px; margin-bottom: 12px; }
.no-book-hint { background: #2a1a00; border: 1px solid var(--gold); border-radius: 8px; padding: 12px; font-size: 12px; color: #c4a882; text-align: center; margin-top: 10px; }
/* Report */
.report-cover {
  background: linear-gradient(135deg,#3d1800,#150800);
  border: 1px solid var(--gold); border-radius: 14px;
  padding: 24px 16px; text-align: center; margin-bottom: 14px;
}
.score-ring {
  display: inline-block; border-radius: 50%; padding: 3px; margin-bottom: 6px;
}
.score-inner {
  width: 72px; height: 72px; background: #150800; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: bold; color: var(--gold);
}
.shloka-box {
  background: #1e1000; border-left: 4px solid var(--gold);
  border-radius: 0 8px 8px 0; padding: 14px; margin: 12px 0;
}
.shloka-text { font-size: 13px; color: #e8c98a; font-style: italic; line-height: 1.9; margin-bottom: 6px; }
.shloka-tr { font-size: 11px; color: var(--sub); font-style: italic; margin-bottom: 5px; }
.shloka-meaning { font-size: 12px; color: #c4a882; margin-bottom: 6px; }
.shloka-src { font-size: 10px; color: var(--gold); background: #2d1500; padding: 2px 8px; border-radius: 8px; display: inline-block; }
.remedy-item { display: flex; gap: 8px; font-size: 12px; color: #d4c4a8; padding: 5px 0; border-bottom: 1px dashed var(--border); }
.remedy-item:last-child { border: none; }
/* Share buttons */
.share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.share-btn {
  padding: 13px 8px; border: none; border-radius: 10px; font-size: 12px;
  font-weight: bold; cursor: pointer; font-family: inherit; text-align: center;
  transition: all 0.2s;
}
.share-btn:active { transform: scale(0.97); }
/* Toast */
.toast {
  position: fixed; bottom: calc(var(--safe-bot) + 80px); left: 50%; transform: translateX(-50%);
  background: #1a3a0a; color: #90EE90; padding: 10px 20px; border-radius: 20px;
  font-size: 13px; border: 1px solid #90EE9044; opacity: 0; transition: opacity 0.3s;
  z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; }
/* No report */
.empty-state { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty-icon { font-size: 48px; margin-bottom: 14px; }
/* Install banner */
.install-banner {
  background: linear-gradient(135deg,#1a3300,#0a1a00);
  border: 1px solid #90EE9044; border-radius: 10px; padding: 14px 16px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 12px;
}
.install-btn {
  background: #90EE90; color: #0a1a00; border: none; border-radius: 8px;
  padding: 8px 14px; font-size: 12px; font-weight: bold; cursor: pointer;
  font-family: inherit; white-space: nowrap; flex-shrink: 0;
}
</style>

  deferredInstall.prompt();

// ── Helpers ──
const scoreColor = s => s >= 75 ? "#27ae60" : s >= 50 ? "#e67e22" : "#e74c3c";
const statusInfo = s => ({ good:{bg:"#0e2a0e",c:"#90EE90"}, warning:{bg:"#2a1a00",c:"#FFD700"}, bad:{bg:"#2a0a0a",c:"#FF6B6B"} }[s] || {bg:"#222",c:"#ccc"});
const statusLabel = s => ({ good: t().good, warning: t().warn, bad: t().bad }[s] || s);

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

function toB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej; r.readAsDataURL(file);
  });
}

// ── Language ──
function setLang(l) {
  lang = l;
  document.getElementById("hTitle").textContent = t().title;
  document.getElementById("hSub").textContent = t().sub;
  ["tl0","tl1","tl2"].forEach((id,i) => document.getElementById(id).textContent = t().tabs[i]);
  render();
}

// ── Tabs ──
function showTab(n) {
  curTab = n;
  [0,1,2].forEach(i => {
    document.getElementById("tab"+i).classList.toggle("active", i===n);
  });
  render();
}

// ── Render ──
function render() {
  const main = document.getElementById("main");
  if (curTab === 0) main.innerHTML = renderBooks();
  else if (curTab === 1) main.innerHTML = renderAnalysis();
  else main.innerHTML = renderReport();
  attachEvents();
}

function renderBooks() {
  const install = deferredInstall ? `
    <div class="install-banner">
      <div style="flex:1;font-size:13px;color:#90EE90">${t().installMsg}</div>
      <button class="install-btn" onclick="installApp()">${t().installBtn}</button>
    </div>` : "";

  const bookList = books.length === 0
    ? `<div class="card" style="text-align:center;color:var(--sub);font-style:italic;padding:32px">${t().noBooks}</div>`
    : books.map((b,i) => `
      <div class="card book-item">
        <div class="book-info">
          <span class="book-icon">📕</span>
          <div>
            <div class="book-name">${b.name}</div>
            <div class="book-size">${b.size} KB</div>
          </div>
        </div>
        <button class="del-btn" onclick="delBook(${i})">${t().del}</button>
      </div>`).join("");

  const readyBadge = books.length > 0
    ? `<span class="badge badge-green">✅ ${books.length}${t().booksReady}</span>` : "";

  const goBtn = books.length > 0
    ? `<button class="go-next" onclick="showTab(1)">${t().goAnalyze}</button>` : "";

  return `
    ${install}
    <div class="upload-zone" onclick="document.getElementById('bookInput').click()">
      <div class="upload-icon">📚</div>
      <div class="upload-title">${t().addBook}</div>
      <div class="upload-sub">${t().addBookSub}</div>
    </div>
    <input type="file" id="bookInput" accept="application/pdf" multiple style="display:none">
    <div class="section-title">
      <span>📖 ${t().bookLib}</span>
      ${readyBadge}
    </div>
    ${bookList}
    ${goBtn}`;
}

function renderAnalysis() {
  const dirOpts = t().dirs.map(d => `<option value="${d}" ${form.facing===d?"selected":""}>${d}</option>`).join("");
  const shapeOpts = t().shapes.map(s => `<option value="${s}" ${form.plotShape===s?"selected":""}>${s}</option>`).join("");
  const floorLabel = form.floorName
    ? `<span style="color:#90EE90;font-size:13px">✅ ${form.floorName}</span>`
    : `<span style="color:var(--sub);font-size:13px">${t().uploadFloor}</span>`;
  const noBookHint = books.length === 0
    ? `<div class="no-book-hint">${t().noBookHint}</div>` : "";
  const errBox = form._err ? `<div class="error-box">${form._err}</div>` : "";

  return `
    <div style="font-size:14px;font-weight:bold;color:#C9A84C;margin-bottom:16px">🏠 ${t().houseTitle}</div>
    <label class="form-label">${t().clientName}</label>
    <input class="form-input" id="fName" value="${form.clientName}" placeholder="${t().clientPh}" oninput="form.clientName=this.value">
    <label class="form-label">${t().address}</label>
    <input class="form-input" id="fAddr" value="${form.address}" placeholder="${t().addressPh}" oninput="form.address=this.value">
    <label class="form-label">${t().facing}</label>
    <select class="form-select" id="fFacing" onchange="form.facing=this.value" style="color:${form.facing?'var(--text)':'var(--sub)'}">
      <option value="">${t().selectDir}</option>
      ${dirOpts}
    </select>
    <label class="form-label">${t().plotShape}</label>
    <select class="form-select" id="fShape" onchange="form.plotShape=this.value" style="color:${form.plotShape?'var(--text)':'var(--sub)'}">
      <option value="">${t().selectShape}</option>
      ${shapeOpts}
    </select>
    <label class="form-label">${t().rooms}</label>
    <textarea class="form-textarea" id="fRooms" placeholder="${t().roomsPh}" oninput="form.rooms=this.value">${form.rooms}</textarea>
    <label class="form-label">${t().floorPlan}</label>
    <div class="card" style="text-align:center;cursor:pointer;padding:16px" onclick="document.getElementById('floorInput').click()">
      ${floorLabel}
    </div>
    <input type="file" id="floorInput" accept="image/*" style="display:none">
    <br>
    ${errBox}
    <button class="analyze-btn ${loading?'loading':'ready'}" onclick="${loading?'':' doAnalyze()'}">${loading?t().analyzing:t().analyze}</button>
    ${noBookHint}`;
}

function renderReport() {
  if (!report) return `
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div style="font-size:14px;margin-bottom:6px">${t().noReport}</div>
      <div style="font-size:12px">${t().analyzeFirst}</div>
    </div>`;

  const sections = (report.sections||[]).map(sec => {
    const si = statusInfo(sec.status);
    const shloka = sec.shloka ? `
      <div class="shloka-box">
        <div class="shloka-text">"${sec.shloka.sanskrit}"</div>
        ${sec.shloka.transliteration ? `<div class="shloka-tr">${sec.shloka.transliteration}</div>` : ""}
        <div class="shloka-meaning">📖 ${sec.shloka.meaning}</div>
        <span class="shloka-src">📚 ${sec.shloka.source}</span>
      </div>` : "";
    const rems = sec.remedies?.length ? `
      <div style="border-top:1px solid var(--border);padding-top:10px;margin-top:8px">
        <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">🔧 ${t().remedies}</div>
        ${sec.remedies.map(r=>`<div class="remedy-item"><span style="color:#C9A84C;flex-shrink:0">◆</span><span>${r}</span></div>`).join("")}
      </div>` : "";
    return `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:14px;font-weight:bold">${sec.icon} ${sec.title}</div>
          <div style="background:${scoreColor(sec.score)};color:#fff;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:bold">${sec.score}/100</div>
        </div>
        <span style="display:inline-block;padding:2px 12px;border-radius:10px;font-size:11px;font-weight:bold;background:${si.bg};color:${si.c};margin-bottom:10px">${statusLabel(sec.status)}</span>
        ${shloka}
        <div style="font-size:13px;color:#c4a882;line-height:1.85">${sec.analysis}</div>
        ${rems}
      </div>`;
  }).join("");

  const topRems = (report.topRemedies||[]).map((r,i) => `
    <div style="display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px">
      <div style="width:26px;height:26px;border-radius:50%;background:#C9A84C;color:#150800;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;flex-shrink:0">${i+1}</div>
      <div>${r}</div>
    </div>`).join("");

  return `
    <div class="report-cover">
      <div style="font-size:34px;margin-bottom:8px">🕉️</div>
      <div style="font-size:18px;font-weight:bold;color:#C9A84C;margin-bottom:4px">${report.clientName}</div>
      <div style="font-size:11px;color:#c4a882;margin-bottom:16px">${report.date} • ${report.facing}</div>
      <div class="score-ring" style="background:conic-gradient(#C9A84C ${report.overallScore*3.6}deg,#2a1000 0)">
        <div class="score-inner">${report.overallScore}</div>
      </div>
      <div style="font-size:11px;color:var(--sub);margin-top:6px">${t().overallScore}</div>
    </div>

    <div class="card">
      <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">📋 ${t().summary}</div>
      <div style="font-size:13px;color:#c4a882;line-height:1.85">${report.summary}</div>
    </div>

    ${sections}

    <div class="card" style="background:linear-gradient(135deg,#3d1800,#150800)">
      <div style="font-size:13px;font-weight:bold;color:#C9A84C;margin-bottom:14px">⭐ ${t().topRemedies}</div>
      ${topRems}
    </div>

    <div class="card">
      <div style="font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;text-align:center">📤 ${t().shareReport}</div>
      <div class="share-grid">
        <button class="share-btn" style="background:linear-gradient(135deg,#7a3a0a,#C9A84C);color:#1a0800" onclick="doDownload()">${t().dlPDF}</button>
        <button class="share-btn" style="background:#128C7E;color:#fff" onclick="doWhatsApp()">${t().whatsapp}</button>
        <button class="share-btn" style="background:#1a3a6a;color:#fff" onclick="doEmail()">${t().emailBtn}</button>
        <button class="share-btn" style="background:#1a1a1a;color:var(--text);border:1px solid var(--border)" onclick="doPrint()">${t().printBtn}</button>
      </div>
    </div>`;
}

// ── Event Attachment ──
function attachEvents() {
  const bookInput = document.getElementById("bookInput");
  if (bookInput) bookInput.onchange = async e => {
    for (const f of Array.from(e.target.files)) {
      if (f.type !== "application/pdf") continue;
      const b64 = await toB64(f);
      books.push({ name:f.name, b64, size:(f.size/1024).toFixed(0) });
    }
    e.target.value = ""; render();
  };

  const floorInput = document.getElementById("floorInput");
  if (floorInput) floorInput.onchange = async e => {
    const f = e.target.files[0]; if (!f) return;
    const b64 = await toB64(f);
    form.floorB64 = b64; form.floorName = f.name; form.floorType = f.type;
    render();
  };
}

function delBook(i) { books.splice(i,1); render(); }

// ── Analyze ──
async function doAnalyze() {
  if (!books.length) { form._err = t().noBookWarn; render(); return; }
  if (!form.clientName || !form.facing) { form._err = t().fillWarn; render(); return; }
  form._err = ""; loading = true; report = null; render();

  try {
    const langName = lang==="as"?"Assamese (অসমীয়া)":lang==="hi"?"Hindi (हिंदी)":"English";
    const system = `You are an expert Vastu Shastra consultant. Use ONLY the provided books. No external knowledge.
Generate a professional Vastu report in ${langName}.
Respond ONLY with valid JSON (no markdown):
{"clientName":"","address":"","date":"","facing":"","overallScore":0-100,"summary":"","sections":[{"title":"","icon":"emoji","score":0-100,"status":"good|warning|bad","shloka":{"sanskrit":"from book","transliteration":"","meaning":"","source":"book,page"},"analysis":"","remedies":[]}],"topRemedies":[],"booksUsed":[]}`;

    const content = [
      ...books.map(b=>({type:"document",source:{type:"base64",media_type:"application/pdf",data:b.b64},title:b.name})),
      ...(form.floorB64?[{type:"image",source:{type:"base64",media_type:form.floorType||"image/jpeg",data:form.floorB64}}]:[]),
      {type:"text",text:`Analyze:\nClient: ${form.clientName}\nAddress: ${form.address||"N/A"}\nFacing: ${form.facing}\nPlot: ${form.plotShape||"N/A"}\nRooms: ${form.rooms||"N/A"}\n${form.floorB64?"Floor plan attached.":""}\nDate: ${new Date().toLocaleDateString(lang==="as"?"as-IN":lang==="hi"?"hi-IN":"en-IN",{year:"numeric",month:"long",day:"numeric"})}`}
    ];

    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,system,messages:[{role:"user",content}]})
    });
    const data = await res.json();
    const txt = data.content.map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    report = JSON.parse(txt);
    loading = false; render(); showTab(2);
  } catch(e) {
    form._err = t().errAnalysis; loading = false; render();
  }
}

// ── Report HTML Builder ──
function buildReportHTML() {
  if (!report) return "";
  const sc=s=>s>=75?"#27ae60":s>=50?"#e67e22":"#e74c3c";
  const sb=s=>({good:{bg:"#0e2a0e",c:"#90EE90"},warning:{bg:"#2a1a00",c:"#FFD700"},bad:{bg:"#2a0a0a",c:"#FF6B6B"}}[s]||{bg:"#222",c:"#ccc"});
  const sl=s=>({good:t().good,warning:t().warn,bad:t().bad}[s]||s);
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${t().reportTitle} - ${report.clientName}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali&family=Noto+Serif+Devanagari&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#f9f4ea;font-family:'Noto Serif Bengali','Noto Serif Devanagari','Libre Baskerville',serif;color:#1a0900}.page{max-width:820px;margin:0 auto;background:#fff;box-shadow:0 0 60px #0002}.cover{background:linear-gradient(150deg,#150800,#3a1500,#150800);color:#f5e6c8;padding:64px 56px;text-align:center;position:relative;overflow:hidden}.cover::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(60deg,transparent,transparent 15px,rgba(201,168,76,.04) 15px,rgba(201,168,76,.04) 30px)}.om{font-size:56px;display:block;margin-bottom:12px}.cover h1{font-size:32px;color:#C9A84C;letter-spacing:2px;margin-bottom:6px}.cover-sub{font-size:13px;color:#c4a882;font-style:italic;margin-bottom:44px}.score-wrap{margin:0 auto 20px;width:96px;height:96px;border-radius:50%;background:conic-gradient(#C9A84C ${report.overallScore*3.6}deg,#2a1500 0);display:flex;align-items:center;justify-content:center}.score-inner{width:76px;height:76px;border-radius:50%;background:#150800;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#C9A84C}.score-lbl{font-size:12px;color:#a08050;margin-bottom:32px}.cover-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;text-align:left;border-top:1px solid #C9A84C44;padding-top:28px}.ci label{font-size:10px;color:#806030;text-transform:uppercase;letter-spacing:1px}.ci .v{font-size:14px;color:#f5e6c8;margin-top:3px}.sec{padding:30px 56px;border-bottom:1px solid #f0e6d0}.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.sec-t{font-size:18px;color:#2a0e00;font-weight:bold}.shloka{background:#fdf6e6;border-left:4px solid #C9A84C;padding:16px 18px;border-radius:0 8px 8px 0;margin:14px 0}.sk-s{font-size:14px;color:#2a0e00;font-style:italic;line-height:1.9;margin-bottom:6px}.sk-tr{font-size:12px;color:#806030;font-style:italic;margin-bottom:5px}.sk-m{font-size:13px;color:#5a3010;margin-bottom:8px}.sk-src{font-size:10px;color:#9b7040;background:#f5e0c0;padding:2px 10px;border-radius:10px;display:inline-block}.ana{font-size:14px;color:#2a1800;line-height:1.95;margin:12px 0}.rem-t{font-size:11px;color:#806030;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px}.rem-i{display:flex;gap:8px;font-size:13px;color:#2a1800;padding:6px 0;border-bottom:1px dashed #f0e6d0}.rem-i:last-child{border:none}.top{background:linear-gradient(135deg,#150800,#2d1000);color:#f5e6c8;padding:36px 56px}.top h2{color:#C9A84C;margin-bottom:22px;font-size:19px}.top-i{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid rgba(201,168,76,.15);font-size:14px}.num{width:28px;height:28px;border-radius:50%;background:#C9A84C;color:#150800;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;flex-shrink:0}.bks{padding:18px 56px;background:#f9f4ea;font-size:12px;color:#6b4a20}.foot{background:#150800;color:#806030;text-align:center;padding:16px;font-size:11px}@media print{body{background:#fff}.page{box-shadow:none}}</style></head><body>
<div class="page">
<div class="cover"><span class="om">🕉️</span><h1>${t().reportTitle}</h1><div class="cover-sub">${t().consultTitle}</div>
<div class="score-wrap"><div class="score-inner">${report.overallScore}</div></div>
<div class="score-lbl">${t().overallScore}</div>
<div class="cover-grid">
<div class="ci"><label>${t().clientLbl}</label><div class="v">${report.clientName}</div></div>
<div class="ci"><label>${t().dateLbl}</label><div class="v">${report.date}</div></div>
<div class="ci"><label>${t().addrLbl}</label><div class="v">${report.address||"—"}</div></div>
<div class="ci"><label>${t().facingLbl}</label><div class="v">${report.facing}</div></div>
</div></div>
<div class="sec"><div class="sec-t" style="margin-bottom:12px">📋 ${t().summary}</div><div class="ana">${report.summary}</div></div>
${(report.sections||[]).map(s=>`<div class="sec"><div class="sec-hd"><div class="sec-t">${s.icon} ${s.title}</div><div style="background:${sc(s.score)};color:#fff;padding:3px 14px;border-radius:16px;font-size:12px;font-weight:bold">${s.score}/100</div></div>
<span style="display:inline-block;padding:3px 12px;border-radius:10px;font-size:11px;font-weight:bold;background:${sb(s.status).bg};color:${sb(s.status).c};margin-bottom:12px">${sl(s.status)}</span>
${s.shloka?`<div class="shloka"><div class="sk-s">"${s.shloka.sanskrit}"</div>${s.shloka.transliteration?`<div class="sk-tr">${s.shloka.transliteration}</div>`:""}<div class="sk-m">📖 ${s.shloka.meaning}</div><span class="sk-src">📚 ${s.shloka.source}</span></div>`:""}
<div class="ana">${s.analysis}</div>${s.remedies?.length?`<div class="rem-t">🔧 ${t().remedies}</div>${s.remedies.map(r=>`<div class="rem-i"><span style="color:#C9A84C">◆</span>${r}</div>`).join("")}`:""}</div>`).join("")}
<div class="top"><h2>⭐ ${t().topRemedies}</h2>${(report.topRemedies||[]).map((r,i)=>`<div class="top-i"><div class="num">${i+1}</div><div>${r}</div></div>`).join("")}</div>
<div class="bks"><strong>📚 ${t().sources}:</strong> ${(report.booksUsed||books.map(b=>b.name)).join(", ")}</div>
<div class="foot">🕉️ ${t().title} • ${t().consultTitle}</div>
</div></body></html>`;
}

// ── Share Actions ──
function doDownload() {
  const blob = new Blob([buildReportHTML()],{type:"text/html;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Vastu_${report.clientName.replace(/\s+/g,"_")}.html`;
  a.click();
}

function doWhatsApp() {
  const msg = encodeURIComponent(`${t().waMsg} ${report.clientName}`);
  window.open(`https://wa.me/?text=${msg}`,"_blank");
}

function doEmail() {
  const sub = encodeURIComponent(`${t().reportTitle} - ${report.clientName}`);
  const body = encodeURIComponent(`${t().clientLbl}: ${report.clientName}\n${t().overallScore}: ${report.overallScore}/100\n\n${report.summary}`);
  window.open(`mailto:?subject=${sub}&body=${body}`,"_blank");
}

function doPrint() {
  const w = window.open("","_blank");
  w.document.write(buildReportHTML()); w.document.close();
  setTimeout(()=>w.print(),800);
}

// ── Init ──
render();
</script>
</body>
</html>
